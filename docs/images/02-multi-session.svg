<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Multi-session collaboration placeholder</title>
  <desc id="desc">Placeholder showing Codex planning, Claude execution, and Kimi review sessions.</desc>
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <text x="120" y="110" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#0f172a">Multi-session workflow</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="120" y="190" width="360" height="520" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
    <text x="160" y="260" font-size="34" font-weight="700" fill="#1e40af">Codex</text>
    <text x="160" y="320" font-size="26" fill="#334155">Plan the change</text>
    <rect x="620" y="190" width="360" height="520" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
    <text x="660" y="260" font-size="34" font-weight="700" fill="#166534">Claude</text>
    <text x="660" y="320" font-size="26" fill="#334155">Implement in workspace</text>
    <rect x="1120" y="190" width="360" height="520" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
    <text x="1160" y="260" font-size="34" font-weight="700" fill="#7c2d12">Kimi</text>
    <text x="1160" y="320" font-size="26" fill="#334155">Review and summarize</text>
    <path d="M500 450 H600" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
    <path d="M1000 450 H1100" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
    <text x="120" y="840" font-size="28" fill="#475569">Use this slot for a real Feishu/Lark screenshot showing session handoff.</text>
