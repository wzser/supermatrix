  <rect width="1200" height="750" fill="#0f172a"/>
  <text x="80" y="90" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#ffffff">npm run init</text>
  <g font-family="Inter, Arial, sans-serif" font-size="28">
