  <rect x="120" y="100" width="760" height="780" rx="28" fill="#ffffff" stroke="#d1d5db" stroke-width="4"/>
  <text x="170" y="180" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#111827">/status</text>
